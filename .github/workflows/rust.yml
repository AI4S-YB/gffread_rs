name: Rust

"on":
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Build
        run: cargo build --workspace --verbose

      - name: Run Rust-only tests
        run: cargo test -p gffread-core --verbose

      - name: Run CLI smoke tests
        run: cargo test -p gffread-rs --test compat_cli --verbose

      - name: Run oracle compatibility tests
        if: runner.os != 'Windows'
        run: |
          make gffread
          cargo test -p gffread-rs --test compat_examples --verbose
          cargo test -p gffread-rs --test compat_fasta_options --verbose
